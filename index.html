<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Associação em Ordem</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0a;
}

/* TOPO */
.top-bar {
  background: #000;
  color: #fff;
  padding: 8px 20px;
  display: flex;
  justify-content: space-between;
  font-size: 14px;
}

.top-bar a {
  color: gold;
  text-decoration: none;
}

.top-bar button {
  margin-left: 5px;
  background: gold;
  border: none;
  cursor: pointer;
}

/* LOGO CENTRAL */
.logo-area {
  background: #fff;
  text-align: center;
  padding: 30px 20px;
}

.logo-area img {
  max-width: 200px;
}

/* MENU */
.menu {
  background: #111;
  text-align: center;
  padding: 15px;
}

.menu a {
  color: gold;
  margin: 0 15px;
  text-decoration: none;
  font-weight: bold;
}

.menu a:hover {
  color: #d4af37;
}

/* CONTEÚDO */
.section {
  padding: 50px 20px;
  text-align: center;
  color: #fff;
}

.alto-contraste {
  background: #fff;
  color: #000;
}
</style>

</head>

<body>

<!-- TOPO -->
<div class="top-bar">
  <div>
    <a href="https://wa.me/556239567600">(62) 3956-7600</a>
    | Segunda à sexta-feira das 8 às 17 horas
  </div>

  <div>
    Acessibilidade:
    <button onclick="diminuirFonte()">A-</button>
    <button onclick="aumentarFonte()">A+</button>
    | Contraste:
    <button onclick="toggleContraste()">🌓</button>
  </div>
</div>

<!-- LOGO -->
<div class="logo-area">
  <!-- TROQUE AQUI PELA SUA LOGO -->
  <img src="https://i.ibb.co/KzcqFwf5/Gemini-Generated-Image-q3fzs1q3fzs1q3fz.png" alt="Logo">
</div>

<!-- MENU -->
<div class="menu">
  <a href="#">Início</a>
  <a href="#">Quem Somos</a>
  <a href="#">Serviços</a>
  <a href="#">Contato</a>
</div>

<!-- CONTEÚDO -->
<div class="section">
  <h2>Regularização de Associações</h2>
  <p>Organização, orientação e acompanhamento para sua entidade funcionar corretamente.</p>
</div>

<!-- SCRIPT -->
<script>
let tamanhoFonte = 16;

function aumentarFonte() {
  tamanhoFonte += 1;
  document.body.style.fontSize = tamanhoFonte + "px";
}

function diminuirFonte() {
  tamanhoFonte -= 1;
  document.body.style.fontSize = tamanhoFonte + "px";
}

function toggleContraste() {
  document.body.classList.toggle("alto-contraste");
}
</script>

</body>
</html>
