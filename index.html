<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Associação em Ordem</title>

<style>
/* --- CONFIGURAÇÕES BÁSICAS --- */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b2a4a;
  color: #fff;
  transition: background 0.3s, color 0.3s; /* Transição suave */
}

/* --- ESTILOS DO MODO CONTASTE --- */
body.contraste {
  background: #000 !important;
  color: #fff !important;
}

body.contraste * {
  background-color: #000 !important;
  color: #fff !important;
  border-color: #fff !important;
}

/* Links com cor diferente pra destacar no modo contraste */
body.contraste a {
  color: #00ffff !important;
}

/* --- CORREÇÃO DA LOGO NO MODO CONTRASTE --- */
/* Esta regra foca especificamente na imagem dentro da area da logo */
body.contraste .logo-area img {
  /* Inverte as cores da logo (de escuro para claro) */
  filter: invert(1) brightness(100%) !important;
  /* Garante que o fundo do PNG permaneça transparente */
  background: transparent !important;
}

/* Outras imagens (se houver) mantêm o comportamento original */
body.contraste img:not(.logo-area img) {
  filter: brightness(0.9) contrast(1.2);
}

/* Corrige a área da logo para ficar preta no modo contraste */
body.contraste .logo-area {
  background: #000 !important;
}

/* --- TOPO --- */
.top-bar {
  background: #3f82bd;
  color: #fff;
  padding: 8px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
}

.top-bar a {
  color: gold;
  text-decoration: none;
}

.top-bar button {
  margin-left: 5px;
  background: gold;
  border: none;
  cursor: pointer;
  padding: 2px 8px;
  border-radius: 3px;
}

/* --- LOGO CENTRAL COM DEGRADÊ --- */
.logo-area {
  /* Exemplo de degradê suave (Opção 1 da resposta anterior) */
  background: linear-gradient(135deg, #eaf4ff 0%, #a2c8eb 100%);
  border-bottom: 1px solid #dbe9f6;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px 0; /* Espaçamento para a logo respirar */
}

.logo-area img {
  max-width: 320px;
  height: auto;
}

/* --- MENU --- */
.menu {
  background: #3f82bd;
  text-align: center;
  padding: 15px;
}

.menu a {
  color: gold;
  margin: 0 15px;
  text-decoration: none;
  font-weight: bold;
}

.menu a:hover {
  color: #d4af37;
}

/* --- CONTEÚDO --- */
.section {
  padding: 50px 20px;
  text-align: center;
}

</style>

</head>

<body>

<div class="top-bar">
  <div>
    <a href="https://wa.me/5574999483875">(74) 99948-3875</a>
    | Agendamento para Consultas de Segunda à sexta-feira.
  </div>

  <div>
    Acessibilidade:
    <button onclick="diminuirFonte()" title="Diminuir Fonte">A-</button>
    <button onclick="aumentarFonte()" title="Aumentar Fonte">A+</button>
    | Contraste:
    <button onclick="toggleContraste()" title="Alternar Alto Contraste">🌓</button>
  </div>
</div>

<div class="logo-area">
  <img src="https://i.ibb.co/0VXPncwf/logo.png" alt="Logo Associação em Ordem">
</div>

<div class="menu">
  <a href="#">Início</a>
  <a href="#">Quem Somos</a>
  <a href="#">Serviços</a>
  <a href="#">Contato</a>
</div>

<div class="section">
  <h2>Regularização de Associações</h2>
  <p>Organização, orientação e acompanhamento para sua entidade funcionar corretamente.</p>
</div>

<script>
let tamanhoFonte = 16;
const bodyHTML = document.body;

function aumentarFonte() {
  tamanhoFonte += 2; // Aumenta de 2 em 2 para ser mais visível
  if (tamanhoFonte > 24) tamanhoFonte = 24; // Limite máximo
  bodyHTML.style.fontSize = tamanhoFonte + "px";
}

function diminuirFonte() {
  tamanhoFonte -= 2;
  if (tamanhoFonte < 12) tamanhoFonte = 12; // Limite mínimo
  bodyHTML.style.fontSize = tamanhoFonte + "px";
}

function toggleContraste() {
  bodyHTML.classList.toggle("contraste");
}
</script>

</body>
</html>
