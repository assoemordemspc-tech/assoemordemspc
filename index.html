<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Associação em Ordem</title>

<style>
.top-bar {
  background: #3f82bd !important;
}

.logo-area {
  background: #eaf4ff;
}

body.contraste {
  background: #000 !important;
  color: #fff !important;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b2a4a;
}

  body.contraste,
body.contraste * {
  background-color: #000 !important;
  color: #fff !important;
  border-color: #fff !important;
}

/* Links com cor diferente pra destacar */
body.contraste .logo-area img {
  /* Inverte as cores (preto vira branco) e remove o brilho excessivo */
  filter: invert(1) brightness(100%);
  
  /* Garante que o fundo da imagem PNG continue transparente */
  background: transparent !important;
}

/* Mantém as outras imagens com o ajuste original, se houver */
body.contraste img:not(.logo-area img) {
  filter: brightness(0.9) contrast(1.2);
}
}

/* Evita imagens “estouradas” */
body.contraste img {
  filter: brightness(0.9) contrast(1.2);
}

/* Corrige a área da logo */
body.contraste .logo-area {
  background: #000 !important;
}
/* TOPO */
.top-bar {
  background: #3f82bd;
  color: #fff;
  padding: 8px 20px;
  display: flex;
  justify-content: space-between;
  font-size: 14px;
}

.top-bar a {
  color: gold;
  text-decoration: none;
}

.top-bar button {
  margin-left: 5px;
  background: gold;
  border: none;
  cursor: pointer;
}

/* LOGO CENTRAL */
.logo-area {
  background: linear-gradient(180deg, #eaf4ff, #ffffff);
  border-bottom: 1px solid #dbe9f6;
}

.logo-area img {
  max-width: 320px;
}
  
.logo-area {
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* MENU */
.menu {
  background: #3f82bd;
  text-align: center;
  padding: 15px;
}

.menu a {
  color: gold;
  margin: 0 15px;
  text-decoration: none;
  font-weight: bold;
}

.menu a:hover {
  color: #d4af37;
}

/* CONTEÚDO */
.section {
  padding: 50px 20px;
  text-align: center;
  color: #fff;
}

</style>

</head>

<body>

<!-- TOPO -->
<div class="top-bar">
  <div>
    <a href="https://wa.me/5574999483875">(74) 99948-3875</a>
    | Agendamento para Consultas de Segunda à sexta-feira.
  </div>

  <div>
    Acessibilidade:
    <button onclick="diminuirFonte()">A-</button>
    <button onclick="aumentarFonte()">A+</button>
    | Contraste:
    <button onclick="toggleContraste()">🌓</button>
  </div>
</div>

<!-- LOGO -->
<div class="logo-area">
  <!-- TROQUE AQUI PELA SUA LOGO -->
  <img src="https://i.ibb.co/0VXPncwf/logo.png" alt="Logo">
</div>

<!-- MENU -->
<div class="menu">
  <a href="#">Início</a>
  <a href="#">Quem Somos</a>
  <a href="#">Serviços</a>
  <a href="#">Contato</a>
</div>

<!-- CONTEÚDO -->
<div class="section">
  <h2>Regularização de Associações</h2>
  <p>Organização, orientação e acompanhamento para sua entidade funcionar corretamente.</p>
</div>

<!-- SCRIPT -->
<script>
let tamanhoFonte = 16;

function aumentarFonte() {
  tamanhoFonte += 1;
  document.body.style.fontSize = tamanhoFonte + "px";
}

function diminuirFonte() {
  tamanhoFonte -= 1;
  document.body.style.fontSize = tamanhoFonte + "px";
}

function toggleContraste() {
  document.body.classList.toggle("contraste");
}
</script>

</body>
</html>
